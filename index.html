<!DOCTYPE html>
<html>
<head>
    <title>My Shop</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f2f2f2;
        }

        header {
            background: #131921;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            width: 220px;
            margin: 15px;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .price {
            color: green;
            font-weight: bold;
            margin: 10px 0;
        }

        button {
            background: orange;
            border: none;
            padding: 10px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: darkorange;
        }
    </style>
</head>

<body>

<header>
    My Shopping Website
</header>

<div class="container">

    <div class="card">
        <img src="https://via.placeholder.com/200" />
        <h3>Product 1</h3>
        <p class="price">₹499</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" />
        <h3>Product 2</h3>
        <p class="price">₹999</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" />
        <h3>Product 3</h3>
        <p class="price">₹1499</p>
        <button>Add to Cart</button>
    </div>

</div>

</body>
</html>
